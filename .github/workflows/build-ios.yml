name: Build iOS (Capacitor)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
      - name: Sync Capacitor iOS
        run: npx cap sync ios
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install || true
      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/NightReader.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive || true
      - uses: actions/upload-artifact@v4
        with:
          name: nightreader-ios-${{ github.ref_name }}
          path: ios/App/build/ipa/*.ipa
          retention-days: 30
          if-no-files-found: warn
