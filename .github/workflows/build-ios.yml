name: Build iOS (Capacitor)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# NOTE: iOS builds require:
#   1. An Apple Developer account (paid, $99/year)
#   2. A distribution certificate exported as a .p12 file
#   3. A provisioning profile (.mobileprovision)
#   Both stored as GitHub Actions secrets.
#
# For open-source distribution without the App Store, consider
# AltStore source or distributing the .ipa directly (sideloading).
# This workflow produces a .ipa you can distribute freely.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-latest
    name: iOS IPA

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Select Xcode version
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      # ── Frontend ──────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Capacitor sync ────────────────────────────────────────────
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # ── CocoaPods ─────────────────────────────────────────────────
      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      # ── Code signing (optional — comment out if not signing) ──────
      # - name: Import signing certificate
      #   uses: apple-actions/import-codesign-certs@v3
      #   with:
      #     p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
      #     p12-password: ${{ secrets.IOS_P12_PASSWORD }}
      #
      # - name: Download provisioning profile
      #   uses: apple-actions/download-provisioning-profiles@v1
      #   with:
      #     bundle-id: "com.nightreader.app"
      #     profile-type: "IOS_APP_ADHOC"
      #     issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
      #     api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
      #     api-private-key: ${{ secrets.APPLE_API_PRIVATE_KEY }}

      # ── Build ─────────────────────────────────────────────────────
      - name: Build iOS (unsigned)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/NightReader.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export IPA
        run: |
          cd ios/App
          xcodebuild \
            -exportArchive \
            -archivePath build/NightReader.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ../../ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightreader-ios-${{ github.ref_name }}.ipa
          path: ios/App/build/ipa/*.ipa
          retention-days: 30

      - name: Attach IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ios/App/build/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
