name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows x64 (.msi + .exe)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build Windows installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "NightReader ${{ github.ref_name }}"
          releaseBody: |
            ## NightReader ${{ github.ref_name }}

            Open-source PDF reader with dark mode, annotations, bookmarks and more.

            ### Download
            - **Windows installer (.msi)** — recommended
            - **Windows setup wizard (.exe)** — alternative
            - **Portable .exe** — no install needed

            > If Windows SmartScreen warns you, click More info then Run anyway.
          releaseDraft: true
          prerelease: false
          args: "--target x86_64-pc-windows-msvc --config src-tauri/tauri.windows.conf.json"
