name: Build Desktop (Tauri)

on:
  push:
    tags:
      - "v*"           # triggers on v0.1.0, v1.0.0, etc.
  workflow_dispatch:   # allow manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ─────────────────────────────────────────────────
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            label: "Windows x64"
          # ── Linux ───────────────────────────────────────────────────
          - platform: ubuntu-22.04
            args: ""
            label: "Linux x64"
          # ── macOS (Intel) ────────────────────────────────────────────
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            label: "macOS Intel"
          # ── macOS (Apple Silicon) ────────────────────────────────────
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            label: "macOS ARM"

    runs-on: ${{ matrix.platform }}
    name: ${{ matrix.label }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Rust ──────────────────────────────────────────────────────
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── Linux system dependencies ─────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── Frontend ──────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── Build ─────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: code signing
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "NightReader ${{ github.ref_name }}"
          releaseBody: |
            ## NightReader ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows | `.msi` installer or `.exe` setup |
            | Linux | `.deb` package or `.AppImage` |
            | macOS Intel | `.dmg` disk image |
            | macOS Apple Silicon | `.dmg` disk image |

            See [CHANGELOG.md](CHANGELOG.md) for what's new.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
